apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: iap-agent-registry-endpoint-iam-binding
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: IAP Agent Registry Endpoint IAM Binding
    source:
      repo: https://github.com/GoogleCloudPlatform/terraform-google-iap-policy.git
      sourceType: git
      dir: /modules/iap-agent-registry-endpoint-iam-binding
    version: 0.1.0
    actuationTool:
      flavor: Terraform
      version: ">= 1.3"
    description: {}
    icon: assets/icon.png
  content:
    examples:
      - name: iap-agent-registry-agent-iam-binding
        location: examples/iap-agent-registry-agent-iam-binding
      - name: iap-agent-registry-endpoint-iam-binding
        location: examples/iap-agent-registry-endpoint-iam-binding
      - name: iap-agent-registry-mcp-server-iam-binding
        location: examples/iap-agent-registry-mcp-server-iam-binding
  interfaces:
    variables:
      - name: project_id
        description: The ID of the project in which the resource belongs.
        varType: string
        required: true
      - name: location
        description: The location of the resource.
        varType: string
        required: true
      - name: endpoint_id
        description: The ID of the Agent Registry endpoint.
        varType: string
        required: true
        connections:
          - source:
              source: github.com/GoogleCloudPlatform/terraform-google-agent-registry//modules/agent-registry-endpoint
              version: ">=0.2.5"
            spec:
              outputExpr: endpoint_id
      - name: role
        description: The role that should be applied. E.g., roles/iap.egressor.
        varType: string
        required: true
      - name: members
        description: Identities that will be granted the privilege in the role.
        varType: list(string)
        defaultValue: []
      - name: condition
        description: An optional IAM Condition for the binding.
        varType: |-
          object({
              title       = string
              description = optional(string)
              expression  = string
            })
      - name: agent_engine_effective_ids
        description: List of Reasoning Engine effective identities to be dynamically formatted and added to the IAM binding members.
        varType: list(string)
        defaultValue: []
        connections:
          - source:
              source: github.com/GoogleCloudPlatform/terraform-google-vertex-ai//modules/agent-engine-nightly
              version: ">= 5.1.0"
            spec:
              outputExpr: "[effective_identity]"
    outputs:
      - name: etag
        description: The etag of the IAM binding.
      - name: iap_policy_id
        description: The ID of the IAM binding.
  requirements:
    roles:
      - level: Project
        roles:
          - roles/iap.admin
          - roles/resourcemanager.projectIamAdmin
    services:
      - cloudresourcemanager.googleapis.com
      - storage-api.googleapis.com
      - serviceusage.googleapis.com
      - iam.googleapis.com
      - agentregistry.googleapis.com
      - aiplatform.googleapis.com
      - apphub.googleapis.com
      - iap.googleapis.com
    providerVersions:
      - source: hashicorp/google-nightly
        version: 0.1.0.25.0
